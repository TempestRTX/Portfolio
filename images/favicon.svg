<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#0D1117"/>

  <!-- 3D Cube – top face (Unity blue) -->
  <polygon points="50,14  78,30  50,46  22,30" fill="#1E6FD9" opacity="0.95"/>
  <!-- Cube – left face (darker blue) -->
  <polygon points="22,30  50,46  50,72  22,56" fill="#0A3D8F"/>
  <!-- Cube – right face (mid blue) -->
  <polygon points="78,30  50,46  50,72  78,56" fill="#1250B8"/>

  <!-- Data bars (amber / analyst accent) -->
  <rect x="44" y="75" width="6" height="16" rx="1.5" fill="#F0A500" opacity="0.95"/>
  <rect x="53" y="69" width="6" height="22" rx="1.5" fill="#F0A500" opacity="0.78"/>
  <rect x="62" y="63" width="6" height="28" rx="1.5" fill="#F0A500" opacity="0.58"/>

  <!-- Baseline under bars -->
  <line x1="42" y1="92" x2="70" y2="92" stroke="#F0A500" stroke-width="1.5" opacity="0.65" stroke-linecap="round"/>
</svg>
